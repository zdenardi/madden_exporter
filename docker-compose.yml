services:
  postgres:
    image: postgres:17
    container_name: madden-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: madden
      POSTGRES_USER: madden
      POSTGRES_PASSWORD: madden
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: